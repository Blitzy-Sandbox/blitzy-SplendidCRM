# =============================================================================
# Nginx SPA Configuration for SplendidCRM Frontend Container
# =============================================================================
#
# This configuration serves the React 19 SPA built by Vite from the frontend
# Docker container. It is copied into the Nginx Alpine image during the
# Dockerfile.frontend multi-stage build as /etc/nginx/conf.d/default.conf.
#
# Architecture:
#   - The internal ALB handles HTTPS termination and path-based routing
#   - Backend paths (/Rest.svc/*, /Administration/Rest.svc/*, /hubs/*, /api/*,
#     /App_Themes/*, /Include/*) are routed by ALB listener rules to the
#     backend ECS Fargate service (Kestrel on port 8080)
#   - All other paths (/* default rule) are routed to this Nginx container
#   - Nginx serves static files from /usr/share/nginx/html (Vite dist/ output)
#   - SPA fallback ensures client-side routing works (React Router)
#
# Key features:
#   - SPA fallback routing (try_files -> index.html)
#   - Source map blocking (defense-in-depth, .map -> 404) [G5]
#   - Static asset caching (1 year, immutable for content-hashed chunks)
#   - Health check endpoint (/health -> 200 ok) for ALB and ECS
#   - Runtime config.json with no-cache headers (injected by docker-entrypoint.sh)
#   - Security headers (X-Content-Type-Options, X-Frame-Options)
#   - Gzip compression for text-based assets
#
# Constraints:
#   - Port 80 only: ALB handles HTTPS termination
#   - proxy_pass for /App_Themes/ and /Include/ enables Docker local validation
#     (in ECS+ALB, ALB listener rules 5+6 intercept these before reaching Nginx)
#   - config.json at /usr/share/nginx/html/config.json is written by
#     docker-entrypoint.sh at container startup from environment variables
#
# Reference: vite.config.ts proxy paths (lines 113-143) define the ALB
# listener rule patterns; dev server headers (lines 109-112) inform the
# security header configuration.
# =============================================================================

server {
    # =========================================================================
    # Server Block Configuration
    # =========================================================================
    # Listen on port 80 — the ALB terminates HTTPS on 443 and forwards
    # plaintext HTTP to this container. No SSL configuration is needed here.
    listen 80;

    # Catch-all server name — this is the only server block in the container.
    # The ALB's DNS name is the sole entry point; no virtual host routing needed.
    server_name _;

    # Document root where Vite's dist/ output is copied during Docker build.
    # The Dockerfile.frontend copies the build output here:
    #   COPY --from=build /app/dist /usr/share/nginx/html
    root /usr/share/nginx/html;

    # Default index file — Vite's index.html is the SPA entry point.
    index index.html;

    # Suppress Nginx version number in the Server response header.
    # Without this directive, Nginx sends "Server: nginx/x.y.z" which
    # discloses the exact version to potential attackers. With server_tokens
    # off, the header is reduced to "Server: nginx" — defense-in-depth
    # hardening even though the ALB is internal-facing.
    server_tokens off;

    # =========================================================================
    # Gzip Compression
    # =========================================================================
    # Compress text-based responses to reduce bandwidth usage between the ALB
    # and client browsers. Content-hashed JS/CSS chunks benefit significantly
    # from gzip (typical 60-80% reduction for JavaScript).
    #
    # gzip_min_length 256: Skip compression for tiny responses where the gzip
    # overhead exceeds the bandwidth savings.
    #
    # gzip_vary on: Adds "Vary: Accept-Encoding" header so proxies and CDNs
    # correctly cache compressed and uncompressed variants separately.
    #
    # gzip_proxied any: Ensures compression works for requests proxied through
    # the ALB (which adds Via and X-Forwarded-For headers).
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;

    # =========================================================================
    # Security Headers (Server Level)
    # =========================================================================
    # Applied to all responses unless overridden by a location block.
    #
    # IMPORTANT: Nginx's add_header inheritance rule — if ANY location block
    # defines its own add_header directives, it does NOT inherit server-level
    # add_header directives. Location blocks that use add_header (config.json,
    # static assets) must explicitly repeat these security headers.
    #
    # X-Content-Type-Options: nosniff — prevents browsers from MIME-sniffing
    # responses away from the declared Content-Type, mitigating drive-by
    # download attacks.
    #
    # X-Frame-Options: SAMEORIGIN — prevents clickjacking by restricting
    # iframe embedding to the same origin. SAMEORIGIN (not DENY) is used
    # because SplendidCRM may use internal iframes for certain UI components.
    # Matches vite.config.ts dev server headers (lines 110-111), with
    # SAMEORIGIN replacing DENY for production compatibility.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # =========================================================================
    # Health Check Endpoint
    # =========================================================================
    # Returns HTTP 200 with body "ok" for:
    #   - ALB target group health checks (path: /health, interval: 30s)
    #   - ECS container health checks
    #
    # Uses default_type instead of add_header Content-Type to preserve
    # security header inheritance from the server level. The "return"
    # directive in a location without any add_header directives correctly
    # inherits all server-level add_header directives (including the
    # "always" parameter for non-2xx responses).
    location = /health {
        default_type text/plain;
        return 200 'ok';
    }

    # =========================================================================
    # Runtime Configuration — No-Cache (config.json)
    # =========================================================================
    # config.json is generated at container startup by docker-entrypoint.sh
    # with environment-specific values:
    #   {
    #     "API_BASE_URL": "",           (empty = same-origin ALB for cookie auth)
    #     "SIGNALR_URL": "",            (empty = same-origin for WebSocket hubs)
    #     "ENVIRONMENT": "dev|staging|production"
    #   }
    #
    # This file MUST NEVER be cached — configuration changes must take effect
    # immediately on page reload without requiring browser cache purge.
    # config-loader.js (in index.html) fetches this synchronously before
    # React initialization.
    #
    # Three cache-busting headers are set for maximum compatibility:
    #   - Cache-Control: no-cache, no-store, must-revalidate (HTTP/1.1)
    #   - Pragma: no-cache (HTTP/1.0 backward compatibility)
    #   - Expires: 0 (HTTP/1.0 backward compatibility)
    #
    # Security headers are explicitly repeated because add_header in this
    # location block overrides server-level add_header inheritance.
    location = /config.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # =========================================================================
    # Source Map Blocking (G5 — Defense-in-Depth)
    # =========================================================================
    # Source maps are deleted from the Docker image during the frontend build
    # stage in Dockerfile.frontend:
    #   RUN find /app/dist -name '*.map' -delete
    #
    # This Nginx rule is a second layer of defense — even if a .map file
    # somehow survives the deletion step, Nginx blocks it with a 404 response.
    # This prevents source code exposure in production.
    #
    # No add_header directives here, so server-level security headers are
    # correctly inherited on the 404 response (via the "always" parameter).
    location ~* \.map$ {
        return 404;
    }

    # =========================================================================
    # Docker DNS Resolver and Backend URL Variable
    # =========================================================================
    # Docker's internal DNS resolver — required when proxy_pass uses a variable.
    # Without this, Nginx cannot resolve 'splendid-backend' at request time.
    # The value 127.0.0.11 is Docker's embedded DNS resolver address, consistent
    # across all Docker bridge networks. In ECS Fargate (awsvpc mode), the
    # backend is accessed via ALB listener rules before reaching Nginx, so
    # these proxy blocks are only exercised in Docker local environments.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_url http://splendid-backend:8080;

    # =========================================================================
    # Backend Static Asset Proxying (Docker Local Only)
    # =========================================================================
    # Credentials.RemoteServer returns '/' (same-origin), so theme asset URLs
    # are /App_Themes/Pacific/style.css, etc. In ECS+ALB, ALB listener rules
    # 5 and 6 intercept /App_Themes/* and /Include/* before they reach Nginx.
    # In Docker local (no ALB), Nginx must proxy these to the backend container.
    #
    # These MUST appear before the static asset regex block because Nginx
    # prefix location blocks (/App_Themes/) are evaluated before regex blocks
    # (~*) only when using exact or prefix matches of sufficient length.
    # =========================================================================

    # ── ALB Rule 5: Theme static assets (served by .NET Kestrel) ─────────────
    location /App_Themes/ {
        proxy_pass         $backend_url;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     $backend_url/ /;
        proxy_read_timeout 30s;
    }

    # ── ALB Rule 6: Include static assets (served by .NET Kestrel) ───────────
    location /Include/ {
        proxy_pass         $backend_url;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     $backend_url/ /;
        proxy_read_timeout 30s;
    }

    # =========================================================================
    # Static Asset Caching (Content-Hashed Chunks)
    # =========================================================================
    # Vite produces content-hashed filenames in the build output:
    #   - JavaScript: vendor-ABC123.js, mobx-DEF456.js, index-GHI789.js
    #   - CSS: index-JKL012.css
    #   - Fonts: fontname-MNO345.woff2
    #
    # Because the filename changes whenever the content changes, "immutable"
    # caching is safe — browsers never need to revalidate these files.
    # A 1-year expiry is the practical maximum for browser caches (RFC 9111).
    #
    # access_log off: Reduces log noise from high-frequency static asset
    # requests that don't require operational monitoring.
    #
    # Security headers are explicitly repeated because add_header in this
    # location block overrides server-level add_header inheritance.
    # Only Vite content-hashed JS chunks and font files — excludes .css, .png,
    # .jpg, .jpeg, .gif, .ico, .svg which are used by backend App_Themes and
    # Include directories. In Nginx, regex blocks (~*) take priority over prefix
    # blocks (/App_Themes/), so including those extensions here would intercept
    # theme assets before the proxy_pass blocks above can handle them.
    location ~* \.(js|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        access_log off;
    }

    # =========================================================================
    # SPA Fallback Routing
    # =========================================================================
    # React Router handles client-side routing for all application paths.
    # All non-file paths must serve index.html so the SPA can resolve the
    # route on the client side.
    #
    # try_files evaluation order:
    #   1. $uri        — exact file match (e.g., /assets/vendor-ABC123.js)
    #   2. $uri/       — directory index (e.g., /assets/ -> /assets/index.html)
    #   3. /index.html — SPA fallback for all other paths
    #
    # This is the default (lowest priority) location block. Exact match (=)
    # and regex (~*) location blocks above take precedence for their
    # respective patterns.
    #
    # No add_header directives here, so server-level security headers
    # (X-Content-Type-Options, X-Frame-Options) are correctly inherited.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
