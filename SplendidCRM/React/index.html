<!DOCTYPE html>
<html lang="en">
<head>
	<title>SplendidCRM</title>
	<meta charset="utf-8" />
	<meta http-equiv="Content-Security-Policy" content="default-src *; script-src 'self' 'unsafe-inline' 'unsafe-eval' *; style-src  'self' 'unsafe-inline' *; img-src * 'self' data: blob: https:; font-src * 'self' data:" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, minimal-ui, viewport-fit=cover" />
	<meta name="format-detection" content="telephone=no" />
	<meta name="msapplication-tap-highlight" content="no" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<link rel="shortcut icon" href="/favicon.ico" type="image/ico" />
	<link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
</head>
<body>
	<div id="root" style="height: 100%"></div>

	<script src="cordova.js"></script>

	<script>
		// Load runtime configuration SYNCHRONOUSLY before React initialization.
		// This enables the same build artifact to work in any environment
		// (development, staging, production) without rebuilding.
		// A synchronous XHR is used intentionally to guarantee that
		// window.__SPLENDID_CONFIG__ is fully populated BEFORE any module
		// script executes — preventing a race condition where Vite's
		// modulepreload in production could start module evaluation before
		// an async fetch completes.
		window.__SPLENDID_CONFIG__ = { API_BASE_URL: '', SIGNALR_URL: '', ENVIRONMENT: 'development' };
		try {
			var xhr = new XMLHttpRequest();
			xhr.open('GET', '/config.json', false);
			xhr.send();
			if (xhr.status === 200) {
				window.__SPLENDID_CONFIG__ = JSON.parse(xhr.responseText);
			}
		} catch (err) {
			console.warn('Failed to load config.json, using defaults:', err);
		}
	</script>

	<script type="module" src="/src/index.tsx"></script>
</body>
</html>
